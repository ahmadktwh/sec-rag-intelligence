version: '3.8'

services:
  # ── SEC RAG API (Backend) ───────────────────────────────────────────────────
  api:
    build: .
    container_name: sec_rag_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  # ── SEC RAG DASHBOARD (Frontend) ────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sec_rag_frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sec_rag_redis
    ports:
      - "6379:6379"
    restart: always

networks:
  default:
    name: sec_rag_network
