apiVersion: v1
kind: Namespace
metadata:
  name: sec-rag
---
apiVersion: v1
kind: Service
metadata:
  name: sec-rag-api-service
  namespace: sec-rag
  labels:
    app: sec-rag-api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
spec:
  type: LoadBalancer
  selector:
    app: sec-rag-api
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: sec-rag
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
