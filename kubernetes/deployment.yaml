apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-rag-api
  namespace: sec-rag
  labels:
    app: sec-rag-api
    version: "1.0.0"
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sec-rag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: sec-rag-api
        tier: backend
    spec:
      containers:
        - name: sec-rag-api
          image: 217113049159.dkr.ecr.us-east-1.amazonaws.com/sec-rag-intelligence:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sec-rag-secrets
                  key: PINECONE_API_KEY
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: sec-rag-secrets
                  key: GOOGLE_API_KEY
            - name: PINECONE_INDEX_NAME
              value: "sec-rag-intelligence"
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sec-rag-redis
  namespace: sec-rag
  labels:
    app: redis
    tier: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        tier: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          args: ["--appendonly", "yes"]
